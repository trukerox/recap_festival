# =============================================================================
# festival_recap — Docker Compose (Raspberry Pi homeserver)
# Deploy to: ~/docker/festival_recap/docker-compose.yml  (user: gatekeeper)
#
# Independent service — NOTHING shared with Evestival. Reuses the shared Pi
# `mariadb` container (own database `festival_recap`, own user) over the
# external `web` network, and is reverse-proxied by the shared `caddy` container at
# https://festival_recap.homeserver.fritz.box
#
# The API server and the render worker run in the SAME process (see
# src/server.js) — the worker is a DB-polling loop, not a separate queue
# service. No Redis/BullMQ: FFmpeg rendering is CPU-bound on a single Pi, so a
# distributed queue buys nothing and this keeps the ops footprint lean (same
# pattern as job_search, which also skips Redis).
#
# SECRETS (Docker secret file mounts → read by src/utils/secrets.js):
#   db_password         → MariaDB `festival_recap` user password
#   jwt_secret          → session/download-link signing key (openssl rand -hex 32)
#   gemini_api_key      → Gemini key for the AI director (aistudio.google.com)
#   telegram_bot_token  → "render done" ping: bot token from @BotFather
#   telegram_chat_id    → "render done" ping: your chat id (from @userinfobot)
#
# ⚠ EVERY secret file listed at the bottom MUST EXIST or `docker compose up`
#   refuses to start the whole service. Leave a file EMPTY to disable just that
#   feature (empty gemini_api_key → heuristics only; empty telegram_* → no
#   pings). Create them all before deploying:
#     cd ~/docker/festival_recap
#     : > secrets/telegram_bot_token.txt && : > secrets/telegram_chat_id.txt
#     chmod 600 secrets/*.txt
#
# FIRST RUN:
#   1) Create DB + user in MariaDB (see scripts/sql/000_create_db_user.sql)
#   2) Drop secret files in ./secrets/*.txt (mode 600)
#   3) Add royalty-free tracks under ./music (see music/README.md)
#   4) docker compose up -d --build
#   5) docker compose exec festival_recap node src/db/migrate.js
# =============================================================================

services:
  festival_recap:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: festival_recap:latest
    container_name: festival_recap
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: mariadb
      DB_NAME: festival_recap
      DB_USER: festival_recap
      # Scratch space in RAM instead of the USB/SD-backed volume: every render
      # writes a decoded WAV (beat detection), extracted frames and the end-card
      # PNG here, then deletes them. Keeping that churn off the disk avoids the
      # I/O bottleneck and the write wear. server.js mkdir -p's this on startup.
      TMP_DIR: /dev/shm/festival_recap
    # Docker's default /dev/shm is only 64MB — too small for a whole-track WAV
    # plus frames, and renders would fail. Peak use is ~20-30MB; 512m is ample
    # headroom and it's RAM the Pi 5 (8GB) can spare.
    shm_size: 512m
    secrets:
      - db_password
      - jwt_secret
      - gemini_api_key
      - telegram_bot_token
      - telegram_chat_id
    volumes:
      # Uploads + rendered output + scratch render workspace. Persist across
      # rebuilds; uploads/renders should be included in backups, tmp can be
      # excluded (regenerated per job).
      - /mnt/storage/festival_recap/data:/app/data
      # Music library — bind-mounted (not baked into the image) so
      # adding/removing tracks only needs a re-seed, not a rebuild. Lives
      # under /mnt/storage like the rest of this service's persistent data
      # (NOT in the git checkout) — writable, since the "Music" tab's
      # auto-import downloads mp3s straight into it. Bootstrapped from the
      # repo's music/library.json template by deploy/setup-pi.sh.
      - /mnt/storage/festival_recap/music:/app/music
      # Colour LUTs (.cube), bind-mounted for the same reasons as music: free LUT
      # packs generally forbid redistribution (so they stay out of git), and
      # swapping the look is a file copy rather than an image rebuild.
      # Read-only — the app never writes here. See luts/README.md for naming.
      - /mnt/storage/festival_recap/luts:/app/luts:ro
    networks:
      - web
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          # FFmpeg encoding is CPU-bound — this needs real headroom, unlike a
          # typical lightweight web service on this Pi. Tune `cpus` down if
          # the Pi has fewer cores or other services are starved; a Pi 4/5
          # quad-core box leaves 1 core free for Caddy/MariaDB/etc. at "3.0".
          cpus: "3.0"
          memory: 1536M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
  telegram_bot_token:
    file: ./secrets/telegram_bot_token.txt
  telegram_chat_id:
    file: ./secrets/telegram_chat_id.txt

# `web` is created by the Caddy/MariaDB stack; it is shared and external here.
networks:
  web:
    external: true
