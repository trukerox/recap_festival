<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Festival Recap Generator</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; background: #111; color: #eee; }
  h1 { font-size: 1.4rem; }
  fieldset { border: 1px solid #444; border-radius: 8px; margin-bottom: 1rem; }
  label { display: block; margin: 0.5rem 0 0.2rem; font-size: 0.9rem; color: #bbb; }
  input, select { width: 100%; padding: 0.5rem; box-sizing: border-box; background: #1c1c1c; color: #eee; border: 1px solid #444; border-radius: 4px; }
  button { padding: 0.6rem 1.2rem; border: none; border-radius: 6px; background: #6d5dfc; color: white; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  progress { width: 100%; height: 1.2rem; }
  #status { margin-top: 1rem; font-size: 0.9rem; }
  video { width: 100%; border-radius: 8px; margin-top: 1rem; background: black; }
  .hidden { display: none; }
  .error { color: #ff6b6b; }
</style>
</head>
<body>
  <h1>Festival Recap Generator</h1>

  <fieldset id="step-project">
    <legend>1. Event details</legend>
    <label>Event name *<input id="eventName" required></label>
    <label>Location<input id="location"></label>
    <label>Date<input id="eventDate" type="date"></label>
    <label>Music style
      <select id="musicStyle">
        <option value="auto">Auto (recommended)</option>
        <option value="festival">Festival</option>
        <option value="edm">EDM</option>
        <option value="electronic">Electronic</option>
        <option value="pop">Pop</option>
        <option value="cinematic">Cinematic</option>
      </select>
    </label>
    <button id="createProjectBtn">Create project</button>
  </fieldset>

  <fieldset id="step-upload" class="hidden">
    <legend>2. Upload photos &amp; clips (min 3)</legend>
    <label>Photos/videos (JPEG, PNG, WEBP, MP4, MOV)<input id="mediaFiles" type="file" multiple accept="image/jpeg,image/png,image/webp,video/mp4,video/quicktime"></label>
    <label>Logo/watermark (optional)<input id="watermarkFile" type="file" accept="image/*"></label>
    <progress id="uploadProgress" value="0" max="100" class="hidden"></progress>
    <button id="uploadBtn">Upload</button>
  </fieldset>

  <fieldset id="step-render" class="hidden">
    <legend>3. Generate recap</legend>
    <button id="renderBtn">Generate 20s recap video</button>
    <div id="status"></div>
    <video id="preview" class="hidden" controls></video>
    <a id="downloadLink" class="hidden" href="#">Download video</a>
  </fieldset>

<script>
const $ = (id) => document.getElementById(id);
let projectId = null;
let jobId = null;

$('createProjectBtn').addEventListener('click', async () => {
  const body = {
    eventName: $('eventName').value.trim(),
    location: $('location').value.trim() || undefined,
    eventDate: $('eventDate').value || undefined,
    musicStyle: $('musicStyle').value,
  };
  if (!body.eventName) return alert('Event name is required');

  const res = await fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) return alert('Failed to create project: ' + (await res.text()));
  const project = await res.json();
  projectId = project.id;
  $('step-upload').classList.remove('hidden');
  $('createProjectBtn').disabled = true;
});

$('uploadBtn').addEventListener('click', () => {
  const files = $('mediaFiles').files;
  if (files.length < 3) return alert('Please select at least 3 photos/clips');

  const form = new FormData();
  for (const f of files) form.append('media', f);
  if ($('watermarkFile').files[0]) form.append('watermark', $('watermarkFile').files[0]);

  const xhr = new XMLHttpRequest();
  const bar = $('uploadProgress');
  bar.classList.remove('hidden');
  xhr.upload.addEventListener('progress', (e) => {
    if (e.lengthComputable) bar.value = Math.round((e.loaded / e.total) * 100);
  });
  xhr.addEventListener('load', () => {
    if (xhr.status >= 200 && xhr.status < 300) {
      $('step-render').classList.remove('hidden');
      $('uploadBtn').disabled = true;
    } else {
      alert('Upload failed: ' + xhr.responseText);
    }
  });
  xhr.open('POST', `/api/projects/${projectId}/media`);
  xhr.send(form);
});

$('renderBtn').addEventListener('click', async () => {
  $('renderBtn').disabled = true;
  const res = await fetch(`/api/projects/${projectId}/render`, { method: 'POST' });
  if (!res.ok) {
    $('status').innerHTML = `<span class="error">${await res.text()}</span>`;
    $('renderBtn').disabled = false;
    return;
  }
  const job = await res.json();
  jobId = job.id;
  pollJob();
});

async function pollJob() {
  const res = await fetch(`/api/jobs/${jobId}`);
  const job = await res.json();
  $('status').textContent = `Status: ${job.status} (${job.progress_percent}%)`;

  if (job.status === 'done') {
    $('preview').src = `/api/jobs/${jobId}/download`;
    $('preview').classList.remove('hidden');
    $('downloadLink').href = `/api/jobs/${jobId}/download`;
    $('downloadLink').classList.remove('hidden');
    return;
  }
  if (job.status === 'failed') {
    $('status').innerHTML += `<br><span class="error">${job.error_message || 'Render failed'}</span>`;
    $('renderBtn').disabled = false;
    return;
  }
  setTimeout(pollJob, 3000);
}
</script>
</body>
</html>
